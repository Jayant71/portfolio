<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jayant Patel</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollToPlugin.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">

    <script>
        // Show content once everything is loaded
        window.addEventListener('load', function() {
            setTimeout(() => {
                document.querySelector('.loading-screen').style.opacity = '0';
                setTimeout(() => {
                    document.querySelector('.loading-screen').style.display = 'none';
                    document.querySelector('.main-container').style.opacity = '1';
                }, 500);
            }, 1000);
        });
    </script>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen">
        <div class="loader"></div>
    </div>

    <!-- Main Content -->
    <main class="main-container" style="opacity: 0; transition: opacity 0.5s ease;">
        <!-- Navigation -->
        <nav class="nav-container">
            <div class="logo">JP</div>
            <button class="mobile-menu-toggle">
                <i class="fas fa-bars"></i>
            </button>
            <ul class="nav-links">
                <li><a href="#home" class="active">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#education">Education</a></li>
                <li><a href="#experience">Experience</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#publications">Publications</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>

        <!-- Hero Section -->
        <section id="home" class="hero-section">
            <div class="hero-content-wrapper">
                <div class="hero-content">
                    <!-- <div class="hero-profile">
                        <div class="hero-image">
                            <img src="assets/profile.jpg" alt="Jayant Patel" />
                        </div>
                    </div> -->
                    <div class="hero-text">
                        <h1>
                            <span>Hi, </span>
                            <span>I'm </span>
                            <span>Jayant</span>
                            <span> Patel</span>
                        </h1>
                        <h2>Research & Software Development <br> Engineer</h2>
                        <p>Specializing in Machine Learning, AI and Android</p>
                        <div class="cta-buttons">
                            <a href="#projects">View Projects</a>
                            <a href="#contact">Contact Me</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Content sections will be dynamically loaded -->
        <div id="dynamic-content"></div>
    </main>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/background.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/cms.js"></script>
    <!-- Removed D3.js -->
    <script src="js/main.js"></script>
</body>
</html>
